name: Update GitHub Streak Stats

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest streak stats
        run: |
          mkdir -p .github/assets
          curl -o .github/assets/streak-stats.svg "https://streak-stats.demolab.com/?user=nitya747&background=0d0b12&ring=a855f7&fire=ec4899&currStreakNum=ec4899&sideNums=ffffff&currStreakLabel=a855f7&sideLabels=a855f7&dates=f4dcff&stroke=2a1c3c&hide_border=true"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/assets/streak-stats.svg
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update GitHub streak statistics [skip ci]"
            git push
          else
            echo "No changes in streak statistics."
          fi
